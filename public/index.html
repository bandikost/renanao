<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app"/>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>React App</title>
  </head>
  <body>
    <div id="root"></div>
    <div class="mask">
      <div class="loader">
      </div>
    </div>

<style> 
    .mask {
    width: 100%; height: 100vh; background: #121212; position: fixed; top: 0; z-index: 1001; transition: 1s; display: flex; justify-content: center; align-items: center;
}
.loader {
    width: 75px; height: 75px; border: 10px solid #d95fe7; border-radius: 50%; border-left-color: #35193a; animation: loader 1s linear infinite;
}

@keyframes loader {
    100% {
        transform: rotate(360deg);
    }
}

</style>


<script>
  // Прелоадер

let mask = document.querySelector('.mask');

window.addEventListener('load', () => {
  mask.classList.add('hide');
  setTimeout(() => {
    mask.remove();
  }, 1000)
});
</script>   
</body></html>
